<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Interactivo SaaS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header-controls">
        <h1 class="logo-title">Roadmap <span>Pro</span></h1>
        <div class="toggle-container">
            <span class="toggle-label">Vista Clásica</span>
            <label class="switch">
                <input type="checkbox" id="viewToggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Vista Avanzada</span>
        </div>
    </div>

    <div class="roadmap-wrapper">
        <div class="timeline-container">
            
            <div class="timeline-header" id="timelineHeader">
                </div>
            
            <div class="today-line" id="todayLine"></div>

            <div class="projects-area" id="projectsArea">
                </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
